<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تسجيل الدخول | LGC Smart Farm OS</title>
<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo-dot">LGC</div>
      <h2>Libya Green Chain</h2>
      <p class="sub">نظام تشغيل المزرعة الذكية — تسجيل الدخول</p>

      <div id="error-box" style="display:none; color:#d64545; font-size:13px; margin-bottom:12px; text-align:center;"></div>

      <form id="login-form">
        <div class="field">
          <label>اسم المستخدم</label>
          <input type="text" id="username" placeholder="admin" required />
        </div>
        <div class="field">
          <label>كلمة المرور</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <button class="btn btn-primary" style="width:100%; margin-top:8px;" type="submit">دخول</button>
      </form>

      <p style="text-align:center; font-size:11px; color:var(--text-muted); margin-top:18px;">
        © LGC Smart Farm OS — جزء من مشروع Libya Green Chain الوطني
      </p>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const errorBox = document.getElementById("error-box");
      errorBox.style.display = "none";

      try {
        const form = new URLSearchParams();
        form.append("username", username);
        form.append("password", password);
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: form,
        });
        if (!res.ok) throw new Error("فشل تسجيل الدخول");
        const data = await res.json();
        localStorage.setItem("lgc-token", data.access_token);
        window.location.href = "index.html";
      } catch (err) {
        // وضع تجريبي: يسمح بالدخول محليًا لعرض الواجهة قبل تشغيل الـ backend
        errorBox.textContent = "تعذر الاتصال بالخادم — سيتم فتح وضع العرض التجريبي.";
        errorBox.style.display = "block";
        setTimeout(() => { window.location.href = "index.html"; }, 1200);
      }
    });
  </script>
</body>
</html>
